plugins {
    id 'java'
    id "com.gradleup.shadow" version "9.2.1"
}

group = 'dev.lumenlang'
version = '2.0.0'

repositories {
    mavenCentral()
    maven { url = "https://repo.lumenlang.dev" }
    maven { url = "https://hub.spigotmc.org/nexus/content/repositories/snapshots/" }
}

dependencies {
    implementation "dev.lumenlang:lumen-plugin:1.3.0-dev.49-6d32df7"
    implementation "org.spigotmc:spigot-api:1.20-R0.1-SNAPSHOT"
    implementation "org.eclipse.lsp4j:org.eclipse.lsp4j:1.0.0"
    implementation "com.google.code.gson:gson:2.13.1"
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

sourceSets {
    wasm {
        java.srcDir 'src/wasm/java'
        compileClasspath += sourceSets.main.output + configurations.compileClasspath
    }
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['-parameters']
}

tasks.named('compileWasmJava') {
    javaCompiler = javaToolchains.compilerFor {
        languageVersion = JavaLanguageVersion.of(26)
    }
    options.compilerArgs += ['--add-modules', 'org.graalvm.webimage.api']
}

jar {
    manifest {
        attributes "Main-Class": "dev.lumenlang.lumen.lsp.LumenLanguageServerLauncher"
    }
}

shadowJar {
    archiveBaseName.set('LumenLSP')
    archiveClassifier.set('')
    archiveVersion.set('')
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
}

tasks.register('registrationDump', JavaExec) {
    group = 'lumen'
    description = 'Scans the classpath for @Registration classes and writes lumen-defaults.txt to the main resources.'
    dependsOn tasks.named('compileJava')
    classpath = sourceSets.main.output.classesDirs + configurations.runtimeClasspath
    mainClass = 'dev.lumenlang.lumen.lsp.bootstrap.RegistrationDumper'
    def output = file("src/main/resources/lumen-defaults.txt")
    outputs.file(output)
    doFirst {
        output.parentFile.mkdirs()
        standardOutput = new FileOutputStream(output)
    }
}

tasks.named('processResources') {
    dependsOn tasks.named('registrationDump')
}

tasks.register('wasmJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    dependsOn tasks.named('registrationDump')
    archiveBaseName.set('LumenLSP')
    archiveClassifier.set('wasm')
    archiveVersion.set('')
    from sourceSets.main.output
    from sourceSets.wasm.output
    configurations = [project.configurations.runtimeClasspath]
    manifest {
        attributes "Main-Class": "dev.lumenlang.lumen.lsp.LumenLanguageServerLauncher"
    }
    exclude 'META-INF/*.SF', 'META-INF/*.DSA', 'META-INF/*.RSA'
    mergeServiceFiles()
}

build {
    dependsOn(tasks.shadowJar)
}